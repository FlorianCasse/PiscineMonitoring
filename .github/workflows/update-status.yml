name: Update Pool Status

on:
  repository_dispatch:
    types: [update_pool_status]

concurrency:
  group: pages
  cancel-in-progress: false

# Default to read-only; only the deploy job escalates to the minimum writes it needs.
permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # commit updated data files
      pages: write      # deploy to GitHub Pages
      id-token: write   # OIDC for deploy-pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Write status.json from HA payload
        env:
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          # Validate JSON before writing to avoid persisting malformed payloads.
          python3 -c "import json, os, sys; json.loads(os.environ['PAYLOAD']); sys.stdout.write(os.environ['PAYLOAD'])" > status.json

      - name: Append to history.json
        env:
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          python3 << 'EOF'
          import json, os
          f = 'history.json'
          if os.path.exists(f):
              try:
                  history = json.loads(open(f).read())
              except (json.JSONDecodeError, ValueError):
                  print("WARNING: history.json corrupt — resetting")
                  history = {"entries": []}
          else:
              history = {"entries": []}
          p = json.loads(os.environ['PAYLOAD'])
          history["entries"].append({
              "ts": p.get("updated_at", ""),
              "temp_water_c": p.get("temp_water_c"),
              "temp_air_c": p.get("temp_air_c"),
              "pump_on": p.get("pump_on"),
              "swimmable": p.get("swimmable"),
              "solar_energy_total_kwh": p.get("solar_energy_total_kwh")
          })
          if len(history["entries"]) > 2016:
              history["entries"] = history["entries"][-2016:]
          history["updated_at"] = history["entries"][-1]["ts"]
          open(f, 'w').write(json.dumps(history))
          print(f"history.json: {len(history['entries'])} entries")
          EOF

      - name: Update daily_summary.json
        env:
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: python3 scripts/aggregate_daily.py

      - name: Commit data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add history.json daily_summary.json
          git diff --staged --quiet || git commit -m "data: update history.json [skip ci]"
          git push

      - name: Inject service worker version
        shell: bash
        run: |
          sed -i "s/SW_VERSION_PLACEHOLDER/${GITHUB_SHA::7}/g" sw.js

      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: '.'

      - uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
        id: deployment
