<style>
  :root {
    --bg: #05090e;
    --bg-2: #0a1118;

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', system-ui, sans-serif;

  .serif { font-family: var(--serif); letter-spacing: 0.01em; font-optical-sizing: auto; }
  .mono  { font-family: 'JetBrains Mono', monospace; }
  .num   { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }

  @keyframes breathe{ 0%,100% { transform: scale(1); opacity: 0.9; } 50% { transform: scale(1.04); opacity: 1; } }
  @keyframes ripple { 0% { transform: scale(0.4); opacity: 0.55; } 100% { transform: scale(1.7); opacity: 0; } }
  @keyframes grow-up{ from { transform: scaleY(0); } to { transform: scaleY(1); } }
  @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    position: sticky; top: 0; z-index: 100;
    background: rgba(220, 38, 38, 0.92);

<div id="stale-banner" class="stale-banner"></div>
<div id="app"><div class="boot">Chargement</div></div>

<script>
/* ========== Data pipeline (vanilla, runs before React) ========== */

const STALE_MINUTES = 15;
const SEASON_START_MONTH = 4; // April — week/month totals scope
const POOL_TARGET = 26;
const SOLAR_CAPACITY_KW = 6.4;

// Fetch a JSON file with graceful fallback (returns null on failure)
async function tryFetch(path) {
  try {
    const res = await fetch(path, { cache: 'no-store' });
    if (!res.ok) return null;
    return await res.json();
  } catch (_) { return null; }
}

// Fetch Open-Meteo forecast (7-day + current humidity/wind/uv)
async function fetchMeteo(lat, lon) {
  if (!lat || !lon) return null;
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}`
      + `&current=relative_humidity_2m,wind_speed_10m,wind_direction_10m,uv_index,apparent_temperature`
      + `&daily=weather_code,temperature_2m_max,temperature_2m_min`
      + `&forecast_days=7&timezone=auto`;
    const res = await fetch(url);
    if (!res.ok) return null;
    return await res.json();
  } catch (_) { return null; }
}

// Weather code → icon id (sun | cloud-sun | cloud | rain)
function wmoToIcon(code) {
  if (code == null) return 'sun';
  if (code === 0) return 'sun';
  if (code <= 2) return 'cloud-sun';
  if (code <= 3) return 'cloud';
  if (code <= 48) return 'cloud';
  if (code <= 67) return 'rain';
  if (code <= 77) return 'cloud';
  if (code <= 82) return 'rain';
  return 'cloud';
}

// Wind direction (deg) → French compass
function degToCompass(deg) {
  if (deg == null) return '';
  const dirs = ['N','NE','E','SE','S','SO','O','NO'];
  return dirs[Math.round(((deg % 360) / 45)) % 8];
}

// Short day label for the next N days
function shortDay(date, lang) {
  const fr = ['Dim.','Lun.','Mar.','Mer.','Jeu.','Ven.','Sam.'];
  const en = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  return (lang === 'fr' ? fr : en)[date.getDay()];
}

// Pool verdict from temperature (matches status.reason heuristic)
function poolVerdict(tempC) {
  if (tempC == null) return 'a-bit-fresh';
  if (tempC < 18) return 'cold';
  if (tempC < 21) return 'a-bit-fresh';
  if (tempC < 24) return 'ok';
  if (tempC < 28) return 'perfect';
  return 'warm';
}

// Bucket history entries hourly, keeping the last sample per hour
function hourlyBuckets(entries, hoursBack, field, now) {
  if (!entries || !entries.length) return [];
  const cutoff = now.getTime() - hoursBack * 3600 * 1000;
  const byHour = new Map();
  for (const e of entries) {
    const t = new Date(e.ts).getTime();
    if (t < cutoff) continue;
    const hourKey = Math.floor(t / 3600000);
    byHour.set(hourKey, e[field]);
  }
  return Array.from(byHour.entries()).sort((a,b) => a[0]-b[0]).map(([,v]) => v);
}

// Hourly solar production (kWh) by differentiating cumulative kWh counter
function hourlySolar(entries, hoursBack, now) {
  if (!entries || !entries.length) return [];
  const cutoff = now.getTime() - hoursBack * 3600 * 1000;
  const byHour = new Map();
  for (const e of entries) {
    const t = new Date(e.ts).getTime();
    if (t < cutoff) continue;
    const hourKey = Math.floor(t / 3600000);
    // Keep first + last sample per hour so we can compute the delta
    const b = byHour.get(hourKey) || { first: e, last: e };
    b.last = e;
    if (!byHour.has(hourKey)) b.first = e;
    byHour.set(hourKey, b);
  }
  return Array.from(byHour.entries())
    .sort((a,b) => a[0]-b[0])
    .map(([,b]) => Math.max(0, (b.last.solar_energy_total_kwh ?? 0) - (b.first.solar_energy_total_kwh ?? 0)));
}

// Today's pump-on intervals, returned as [{from:"HH:MM", to:"HH:MM"}]
function todayPumpSchedule(entries, now) {
  if (!entries || !entries.length) return [];
  const dayKey = now.toISOString().slice(0, 10);
  const tz = now.getTimezoneOffset() * 60000;
  const startOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
  const today = entries.filter(e => {
    const t = new Date(e.ts).getTime();
    return t >= startOfDay;
  });
  if (!today.length) return [];
  const runs = [];
  let runStart = null;
  for (const e of today) {
    if (e.pump_on && runStart == null) runStart = e.ts;
    else if (!e.pump_on && runStart != null) {
      runs.push({ from: fmtHM(runStart), to: fmtHM(e.ts) });
      runStart = null;
    }
  }
  if (runStart != null) runs.push({ from: fmtHM(runStart), to: fmtHM(today[today.length-1].ts) });
  return runs;
}

function fmtHM(iso) {
  const d = new Date(iso);
  return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}

function safeGet(key, fallback = null) {
  try { return localStorage.getItem(key) ?? fallback; } catch (_) { return fallback; }
}
function safeSet(key, value) {
  try { localStorage.setItem(key, value); } catch (_) {}
}

function buildHouseData(status, daily, history, meteo) {
  const now = new Date();
  const entries = (history && history.entries) || [];
  const dailyEntries = (daily && daily.entries) || [];

  // Pool trend = today avg water − yesterday avg water
  let poolTrend = 0;
  if (dailyEntries.length >= 2) {
    const last = dailyEntries[dailyEntries.length - 1];
    const prev = dailyEntries[dailyEntries.length - 2];
    if (last.avg_water_c != null && prev.avg_water_c != null) {
      poolTrend = +(last.avg_water_c - prev.avg_water_c).toFixed(1);
    }
  }

  const poolTemp = status && status.temp_water_c != null ? +status.temp_water_c : null;
  const airTemp  = status && status.temp_air_c   != null ? +status.temp_air_c   : null;
  const solarW   = status && status.solar_power_w  != null ? +status.solar_power_w : null;

  const pool24 = hourlyBuckets(entries, 24, 'temp_water_c', now);
  const air24  = hourlyBuckets(entries, 24, 'temp_air_c',  now);
  const solar24Kwh = hourlySolar(entries, 24, now);
  const solarCapacity = Math.max(SOLAR_CAPACITY_KW, ...solar24Kwh);

  // Today's solar kWh — prefer last daily_summary entry (today)
  const todayIso = now.toISOString().slice(0, 10);
  const todayEntry = dailyEntries.find(e => e.date === todayIso) || dailyEntries[dailyEntries.length - 1];

  const solarToday = todayEntry && todayEntry.solar_kwh_today != null
    ? +todayEntry.solar_kwh_today
    : solar24Kwh.reduce((a,b) => a + b, 0);

  // Last 7 days
  const week = dailyEntries.slice(-7);
  const weekKwh = week.reduce((a, e) => a + (e.solar_kwh_today || 0), 0);
  // Current calendar month
  const monthKey = todayIso.slice(0, 7);
  const monthKwh = dailyEntries
    .filter(e => e.date.startsWith(monthKey))
    .reduce((a, e) => a + (e.solar_kwh_today || 0), 0);

  // Outdoor hi/lo (today from daily_summary) and optional meteo metrics
  const outHi = todayEntry && todayEntry.max_air_c != null ? Math.round(todayEntry.max_air_c) : (airTemp != null ? Math.round(airTemp) : null);
  const outLo = todayEntry && todayEntry.min_air_c != null ? Math.round(todayEntry.min_air_c) : null;

  let outdoorExtras = { feels: null, humidity: null, wind: null, windDir: '', uv: null };
  let forecast = [];
  if (meteo && meteo.current) {
    outdoorExtras = {
      feels: meteo.current.apparent_temperature,
      humidity: Math.round(meteo.current.relative_humidity_2m),
      wind: Math.round(meteo.current.wind_speed_10m),
      windDir: degToCompass(meteo.current.wind_direction_10m),
      uv: meteo.current.uv_index != null ? Math.round(meteo.current.uv_index) : null,
    };
  }
  if (meteo && meteo.daily && meteo.daily.time) {
    forecast = meteo.daily.time.slice(0, 7).map((iso, i) => {
      const d = new Date(iso + 'T12:00:00');
      return {
        iso,
        date: d,
        hi: Math.round(meteo.daily.temperature_2m_max[i]),
        lo: Math.round(meteo.daily.temperature_2m_min[i]),
        icon: wmoToIcon(meteo.daily.weather_code[i]),
      };
    });
  }

  // Filtration: derive today's runs from history; state from status
  const schedule = todayPumpSchedule(entries, now);
  const running = !!(status && status.pump_on);
  const runningRun = running && schedule.length ? schedule[schedule.length - 1] : null;
  const todayHours = todayEntry && todayEntry.pump_on_minutes != null
    ? Math.round(todayEntry.pump_on_minutes / 60 * 10) / 10
    : null;

  // Staleness
  const updatedAt = status && status.updated_at ? new Date(status.updated_at) : null;
  const ageMin = updatedAt ? (now - updatedAt) / 60000 : Infinity;
  const stale = ageMin > STALE_MINUTES;

  // Fake-data friendly fallbacks used only when the real field is missing
  const lat = parseFloat(safeGet('piscine_lat', '43.79')) || 43.79;
  const lon = parseFloat(safeGet('piscine_lon', '4.83'))  || 4.83;

  return {
    location: { name: safeGet('piscine_location', 'Maison'), lat, lon },
    now,
    updatedAt, stale,
    sensorsOk: status ? !!status.sensors_ok : true,
    reason: status ? (status.reason || '') : '',
    swimmable: status ? !!status.swimmable : false,

    pool: {
      temp: poolTemp,
      trend: poolTrend,
      target: POOL_TARGET,
      verdict: poolVerdict(poolTemp),
      history24: pool24,
    },

    outdoor: {
      temp: airTemp,
      feels: outdoorExtras.feels,
      high: outHi, low: outLo,
      humidity: outdoorExtras.humidity,
      wind: outdoorExtras.wind,
      windDir: outdoorExtras.windDir,
      uv: outdoorExtras.uv,
      history24: air24,
      forecast,
    },

    solar: {
      nowKw: solarW != null ? +(solarW / 1000).toFixed(2) : null,
      capacity: +solarCapacity.toFixed(1),
      todayKwh: +solarToday.toFixed(1),
      weekKwh: +weekKwh.toFixed(1),
      monthKwh: +monthKwh.toFixed(1),
      history24: solar24Kwh,
    },

    filtration: {
      state: running ? 'running' : 'idle',
      runningSince: runningRun ? runningRun.from : null,
      stopsAt: runningRun ? runningRun.to : null,  // may be "now" when live
      todayHours,
      schedule,
    },
  };
}

async function loadHouseData() {
  const lat = parseFloat(safeGet('piscine_lat', '43.79')) || 43.79;
  const lon = parseFloat(safeGet('piscine_lon', '4.83'))  || 4.83;
  const [status, daily, history, meteo] = await Promise.all([
    tryFetch('status.json'),
    tryFetch('daily_summary.json'),
    tryFetch('history.json'),
    fetchMeteo(lat, lon),
  ]);
  return buildHouseData(status, daily, history, meteo);
}

window.__dataReady = loadHouseData();

// Stale banner painter (kept in vanilla so it works even if React fails)
window.__dataReady.then(data => {
  if (data && data.stale) {
    const b = document.getElementById('stale-banner');
    b.classList.add('visible');
    b.textContent = 'Données non actualisées depuis plus de 15 min';
  }
});
</script>

    <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
      <circle cx="12" cy="12" r="4"/>
      {[0,60,120,180,240,300].map(d => {
        const a = d * Math.PI/180; const r1 = 6.5, r2 = 9.5;
        return <line key={d} x1={12+Math.cos(a)*r1} y1={12+Math.sin(a)*r1} x2={12+Math.cos(a)*r2} y2={12+Math.sin(a)*r2}/>;
      })}
    </svg>
  ),
  arrowUp:   (s = 12, c = 'currentColor') => <svg width={s} height={s} viewBox="0 0 12 12" fill="none" stroke={c} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><path d="M6 10V2M3 5l3-3 3 3"/></svg>,
  arrowDown: (s = 12, c = 'currentColor') => <svg width={s} height={s} viewBox="0 0 12 12" fill="none" stroke={c} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><path d="M6 2v8M3 7l3 3 3-3"/></svg>,
  pump: (s = 18, c = 'currentColor') => (
    <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
      <circle cx="12" cy="12" r="5"/>
      <path d="M12 7v5l3 2"/>
    </svg>
  ),
  leaf: (s = 16, c = 'currentColor') => (
    <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
      <path d="M20 4c-9 0-14 4.5-14 11 0 2 .5 3.5 1.5 5 5-1 13-4 12.5-16z"/>
      <path d="M7.5 20c2-5 6-8 11-9"/>
    </svg>
  ),
  alert: (s = 14, c = 'currentColor') => (
    <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
      <path d="M12 3 2 21h20L12 3z"/><path d="M12 10v5"/><circle cx="12" cy="18" r="0.6" fill={c}/>
    </svg>
  ),
};

function getIcon(name, s, c) {
  switch (name) {
    case 'sun': return Ico.sun(s, c);
    case 'cloud': return Ico.cloud(s, c);
    case 'cloud-sun': return Ico.cloudSun(s, c);
    case 'rain': return Ico.rain(s, c);
    default: return Ico.sun(s, c);
  }
}

function AnimatedNumber({ value, decimals = 1, suffix = '', duration = 1400 }) {
  const [v, setV] = React.useState(0);
  const rafRef = React.useRef();
  React.useEffect(() => {
    if (value == null || !Number.isFinite(value)) { setV(0); return; }
    const start = performance.now();
    const tick = (t) => {
      const p = Math.min(1, (t - start) / duration);
      const eased = 1 - Math.pow(1 - p, 3);
      setV(value * eased);
      if (p < 1) rafRef.current = requestAnimationFrame(tick);
    };
    rafRef.current = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(rafRef.current);
  }, [value, duration]);
  if (value == null || !Number.isFinite(value)) return <span className="num">—</span>;
  return <span className="num">{v.toFixed(decimals)}{suffix}</span>;
}

function LiveDot({ color = '#6fb9ff', size = 7 }) {
  return (
    <span style={{ position: 'relative', display: 'inline-block', width: size, height: size }}>
      <span style={{ position: 'absolute', inset: 0, borderRadius: '50%', background: color, animation: 'ripple 1.8s ease-out infinite' }}/>
      <span style={{ position: 'absolute', inset: 0, borderRadius: '50%', background: color }}/>
    </span>
  );
}

function Card({ children, onClick, style, label }) {
  return (
    <div
      onClick={onClick}
      aria-label={label}
      style={{
        position: 'relative',
        background: 'linear-gradient(180deg, rgba(255,255,255,0.035), rgba(255,255,255,0.015))',
        border: '1px solid var(--line)',
        borderRadius: 22,
        padding: 18,
        cursor: onClick ? 'pointer' : 'default',
        transition: 'border-color 0.3s, transform 0.3s',
        overflow: 'hidden',
        ...style,
      }}>
      {children}
    </div>
  );
}

function MicroLabel({ children, style }) {
  return (
    <span style={{
      fontFamily: 'JetBrains Mono, monospace',
      fontSize: 10.5,
      letterSpacing: '0.18em',
      textTransform: 'uppercase',
      color: 'var(--ink-faint)',
      ...style,
    }}>{children}</span>
  );
}

/* ========== Chart primitives ========== */

function Sparkline({ data, width = 300, height = 48, color = '#6fb9ff', fill = true, strokeWidth = 1.6 }) {
  if (!data || data.length < 2) return <div style={{ height, color: 'var(--ink-faint)', fontSize: 11, fontFamily: 'JetBrains Mono, monospace', textAlign: 'center' }}>—</div>;
  const min = Math.min(...data), max = Math.max(...data);
  const range = max - min || 1;
  const step = width / (data.length - 1);
  const points = data.map((v, i) => [i * step, height - ((v - min) / range) * (height - 6) - 3]);
  const d = points.map((p, i) => (i === 0 ? `M${p[0]},${p[1]}` : `L${p[0]},${p[1]}`)).join(' ');
  const area = `${d} L${width},${height} L0,${height} Z`;
  const uid = React.useId();
  return (
    <svg width="100%" viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="none" style={{ display: 'block', overflow: 'visible' }}>
      {fill && (
        <>
          <defs>
            <linearGradient id={`spg-${uid}`} x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stopColor={color} stopOpacity="0.28"/>
              <stop offset="1" stopColor={color} stopOpacity="0"/>
            </linearGradient>
          </defs>
          <path d={area} fill={`url(#spg-${uid})`}/>
        </>
      )}
      <path d={d} fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round"/>
      <circle cx={points[points.length-1][0]} cy={points[points.length-1][1]} r={3} fill={color}/>
    </svg>
  );
}

function HourBars({ data, color = '#f5b872', height = 110, nowHour }) {
  const safe = data && data.length ? data : Array(24).fill(0);
  const max = Math.max(...safe) || 1;
  return (
    <div style={{ display: 'flex', alignItems: 'flex-end', gap: 2, height, width: '100%' }}>
      {safe.map((v, i) => {
        const h = Math.max(2, (v / max) * (height - 10));
        const active = i === safe.length - 1 || i === nowHour;
        return (
          <div key={i} style={{
            flex: 1, height: h,
            background: active ? color : `${color}66`,
            borderRadius: 2,
            transformOrigin: 'bottom',
            animation: `grow-up 0.9s cubic-bezier(.2,.7,.2,1) ${i*0.015}s both`,
          }}/>
        );
      })}
    </div>
  );
}

function FiltrationStrip({ schedule, nowHour }) {
  const parse = s => parseInt(s.split(':')[0], 10) + parseInt(s.split(':')[1], 10)/60;
  return (
    <div style={{ position: 'relative', height: 30, background: 'rgba(255,255,255,0.04)', borderRadius: 8, overflow: 'hidden' }}>
      {Array.from({length: 25}).map((_,i) => i % 6 === 0 && (
        <div key={i} style={{
          position: 'absolute', top: 0, bottom: 0,
          left: `${(i/24)*100}%`,
          width: 1, background: 'rgba(255,255,255,0.06)',
        }}/>
      ))}
      {(schedule || []).map((r, i) => {
        const from = parse(r.from), to = parse(r.to);
        const left = (from/24)*100, width = Math.max(0.5, ((to-from)/24)*100);
        return (
          <div key={i} style={{
            position: 'absolute', top: 4, bottom: 4,
            left: `${left}%`, width: `${width}%`,
            background: 'linear-gradient(90deg, rgba(111,185,255,0.35), rgba(111,185,255,0.55))',
            borderRadius: 4,
            boxShadow: '0 0 20px rgba(111,185,255,0.25)',
          }}/>
        );
      })}
      <div style={{ position: 'absolute', top: -2, bottom: -2, left: `${(nowHour/24)*100}%`, width: 1.5, background: '#fff', boxShadow: '0 0 8px rgba(255,255,255,0.6)' }}/>
      <div style={{ position: 'absolute', top: -4, left: `calc(${(nowHour/24)*100}% - 4px)`, width: 8, height: 8, borderRadius: '50%', background: '#fff' }}/>
    </div>
  );
}

function Radial({ value, max, size = 140, stroke = 10, color = '#6fb9ff', trackColor = 'rgba(255,255,255,0.06)', children }) {
  const r = size/2 - stroke/2 - 2;
  const c = 2 * Math.PI * r;
  const pct = Math.min(1, Math.max(0, (value || 0) / (max || 1)));
  return (
    <div style={{ position: 'relative', width: size, height: size, display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}>
      <svg width={size} height={size} style={{ position: 'absolute', inset: 0, transform: 'rotate(-90deg)' }}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={trackColor} strokeWidth={stroke}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
          strokeLinecap="round"
          strokeDasharray={c} strokeDashoffset={c * (1 - pct)}
          style={{ transition: 'stroke-dashoffset 1.4s cubic-bezier(.2,.7,.2,1)' }}/>
      </svg>
      <div style={{ position: 'relative', textAlign: 'center' }}>{children}</div>
    </div>
  );
}

function PoolHero({ data, t, expanded, onExpand }) {
  const status = t.pool[data.verdict];

  return (
    <Card onClick={onExpand} style={{ padding: 22 }}>
      <div aria-hidden style={{
        position: 'absolute', inset: 0, pointerEvents: 'none',
        background: `radial-gradient(60% 60% at 70% 40%, ${toneColor}18, transparent 70%)`,
      }}/>
      <div aria-hidden style={{ position: 'absolute', top: 24, right: 22, width: 120, height: 120, pointerEvents: 'none' }}>
        {[0, 0.6, 1.2].map((d,i) => (
          <div key={i} style={{
            position: 'absolute', inset: 0, borderRadius: '50%',
            border: `1px solid ${toneColor}`,
            animation: `ripple 3.6s ease-out ${d}s infinite`,
            opacity: 0.5,
          }}/>
        ))}
        <div style={{
          position: 'absolute', inset: '36%', borderRadius: '50%',

            <MicroLabel>Piscine</MicroLabel>
            <div className="serif" style={{ fontSize: 24, fontWeight: 400, marginTop: 6, letterSpacing: 0.2 }}>
              {status.title}
            </div>
            <div style={{ fontSize: 13, color: 'var(--ink-dim)', marginTop: 2 }}>
              {status.sub}
            </div>
          </div>
          {data.trend !== 0 && (
            <div style={{
              display: 'inline-flex', alignItems: 'center', gap: 6,
              padding: '5px 10px', borderRadius: 999,

              color: toneColor,
              fontSize: 11, fontFamily: 'JetBrains Mono, monospace', letterSpacing: '0.06em',
            }}>
              {data.trend > 0 ? Ico.arrowUp(10, toneColor) : Ico.arrowDown(10, toneColor)}
              <span className="num">{Math.abs(data.trend).toFixed(1)}°</span>
            </div>
          )}
        </div>

        <div style={{ display: 'flex', alignItems: 'baseline', gap: 4, marginTop: 10 }}>
          <span className="serif num" style={{ fontSize: 96, fontWeight: 400, letterSpacing: -2, lineHeight: 1, color: '#fff' }}>
            {hasTemp ? <AnimatedNumber value={data.temp} decimals={1}/> : '—'}
          </span>
          <span className="serif" style={{ fontSize: 40, fontWeight: 400, color: 'var(--ink-dim)' }}>°</span>
        </div>

        <div style={{ marginTop: 18, display: 'flex', alignItems: 'center', gap: 10 }}>
          <div style={{ flex: 1, height: 3, background: 'rgba(255,255,255,0.06)', borderRadius: 999, position: 'relative' }}>
            <div style={{
              position: 'absolute', left: 0, top: 0, bottom: 0,
              width: `${Math.min(100, ((hasTemp ? data.temp : 0) / 32) * 100)}%`,
              background: `linear-gradient(90deg, ${toneColor}, ${toneColor}dd)`,
              borderRadius: 999,
              animation: 'grow-up 1.2s ease-out both',
              transformOrigin: 'left',
            }}/>
            <div style={{
              position: 'absolute', left: `${(data.target/32)*100}%`, top: -3, bottom: -3,
              width: 1.5, background: 'rgba(255,255,255,0.25)',
            }}/>
          </div>
          <span style={{ fontSize: 10, color: 'var(--ink-faint)', fontFamily: 'JetBrains Mono, monospace' }}>{t.target} {data.target}°</span>
        </div>

        <div style={{ marginTop: 14, opacity: 0.85 }}>
          <Sparkline data={data.history24} width={340} height={36} color={toneColor} strokeWidth={1.2}/>
        </div>
      </div>
    </Card>
  );
}

function OutdoorCard({ data, t, lang }) {
  const hasTemp = data.temp != null && Number.isFinite(data.temp);
  const hasForecast = data.forecast && data.forecast.length > 0;
  const hasExtras = data.humidity != null || data.wind != null || data.uv != null;

  return (
    <Card>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
        <div>
          <MicroLabel>{t.outdoor.label}</MicroLabel>
          <div style={{ display: 'flex', alignItems: 'baseline', gap: 2, marginTop: 10 }}>
            <span className="serif num" style={{ fontSize: 46, fontWeight: 400, letterSpacing: -0.5, lineHeight: 1 }}>
              {hasTemp ? <AnimatedNumber value={data.temp} decimals={1}/> : '—'}
            </span>
            <span className="serif" style={{ fontSize: 22, color: 'var(--ink-dim)' }}>°</span>
          </div>
          {data.feels != null && (
            <div style={{ fontSize: 12, color: 'var(--ink-dim)', marginTop: 4 }}>
              {t.feels} <span className="num">{(+data.feels).toFixed(1)}°</span>
            </div>
          )}
          {data.high != null && data.low != null && (
            <div style={{ fontSize: 11, color: 'var(--ink-faint)', marginTop: 4, fontFamily: 'JetBrains Mono, monospace' }}>
              <span className="num">{data.high}°</span> / <span className="num">{data.low}°</span>
            </div>
          )}
        </div>
        <div style={{ color: '#f5b872', marginTop: 4 }}>
          {getIcon(hasForecast ? data.forecast[0].icon : 'sun', 42, '#f5b872')}
        </div>
      </div>

      {hasForecast && (
        <div style={{ display: 'flex', gap: 8, marginTop: 18, justifyContent: 'space-between' }}>
          {data.forecast.slice(0, 5).map((d, i) => (
            <div key={i} style={{
              flex: 1, textAlign: 'center',
              padding: '10px 4px',
              borderRadius: 12,
              background: i === 0 ? 'rgba(245,184,114,0.08)' : 'transparent',
              border: i === 0 ? '1px solid rgba(245,184,114,0.18)' : '1px solid transparent',
            }}>
              <div style={{ fontSize: 10, color: 'var(--ink-faint)', fontFamily: 'JetBrains Mono, monospace', letterSpacing: '0.06em', textTransform: 'uppercase' }}>
                {i === 0 ? (lang === 'fr' ? 'Auj.' : 'Today') : shortDayForLang(d.date, lang)}
              </div>
              <div style={{ margin: '6px 0', display: 'flex', justifyContent: 'center', color: d.icon === 'sun' ? '#f5b872' : d.icon === 'rain' ? '#6fb9ff' : 'var(--ink-dim)' }}>
                {getIcon(d.icon, 20)}
              </div>
              <div style={{ fontSize: 12 }} className="num">{d.hi}°</div>
              <div style={{ fontSize: 11, color: 'var(--ink-faint)' }} className="num">{d.lo}°</div>
            </div>
          ))}
        </div>
      )}

      {hasExtras && (
        <div style={{ display:'flex', justifyContent:'space-between', marginTop: 14, fontSize: 11, color: 'var(--ink-dim)', fontFamily: 'JetBrains Mono, monospace', flexWrap: 'wrap', gap: 8 }}>
          {data.humidity != null && <span style={{ display: 'inline-flex', alignItems: 'center', gap: 5 }}>{Ico.drop(12)} {data.humidity}%</span>}
          {data.wind != null && <span style={{ display: 'inline-flex', alignItems: 'center', gap: 5 }}>{Ico.wind(12)} {data.wind} km/h {data.windDir}</span>}
          {data.uv != null && <span style={{ display: 'inline-flex', alignItems: 'center', gap: 5 }}>{Ico.uv(12)} UV {data.uv}</span>}
        </div>
      )}
    </Card>
  );
}

// Helper used in OutdoorCard for forecast day labels
function shortDayForLang(date, lang) {
  const fr = ['Dim.','Lun.','Mar.','Mer.','Jeu.','Ven.','Sam.'];
  const en = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  return (lang === 'fr' ? fr : en)[date.getDay()];
}

function SolarCard({ data, t, lang, nowHour }) {
  const hasNow = data.nowKw != null && Number.isFinite(data.nowKw);
  const pct = hasNow ? (data.nowKw / data.capacity) * 100 : 0;
  return (
    <Card>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
        <div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <MicroLabel>{t.solar.label}</MicroLabel>
            <span style={{ display: 'inline-flex', alignItems: 'center', gap: 5, color: '#f5b872', fontSize: 10, fontFamily: 'JetBrains Mono, monospace', letterSpacing: '0.1em' }}>
              <LiveDot color="#f5b872" size={6}/> {t.solar.live.toUpperCase()}
            </span>
          </div>
          <div style={{ display: 'flex', alignItems: 'baseline', gap: 4, marginTop: 10 }}>
            <span className="serif num" style={{ fontSize: 46, fontWeight: 400, letterSpacing: -0.5, lineHeight: 1, color: '#f5b872' }}>
              {hasNow ? <AnimatedNumber value={data.nowKw} decimals={2}/> : '—'}
            </span>
            <span className="serif" style={{ fontSize: 18, color: 'var(--ink-dim)' }}>kW</span>
          </div>
          <div style={{ fontSize: 11, color: 'var(--ink-faint)', marginTop: 2, fontFamily: 'JetBrains Mono, monospace' }}>
            / {data.capacity} kW {lang === 'fr' ? 'crête' : 'peak'}
          </div>
        </div>
        <div style={{ marginTop: -4 }}>
          <Radial value={data.nowKw} max={data.capacity} size={72} stroke={6} color="#f5b872">
            <div style={{ fontSize: 14, fontFamily: 'JetBrains Mono, monospace', color: '#f5b872' }} className="num">
              {hasNow ? Math.round(pct) : 0}%
            </div>
          </Radial>
        </div>
      </div>

      <div style={{ marginTop: 16 }}>
        <HourBars data={data.history24} color="#f5b872" height={72} nowHour={nowHour}/>
      </div>

      <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 14, paddingTop: 12, borderTop: '1px solid var(--line)', fontSize: 12 }}>
        <div>
          <div style={{ color: 'var(--ink-faint)', fontSize: 10, fontFamily: 'JetBrains Mono, monospace', letterSpacing: '0.1em', textTransform: 'uppercase' }}>{t.today}</div>
          <div className="num" style={{ marginTop: 2, fontSize: 14 }}>{data.todayKwh} kWh</div>
        </div>
        <div>
          <div style={{ color: 'var(--ink-faint)', fontSize: 10, fontFamily: 'JetBrains Mono, monospace', letterSpacing: '0.1em', textTransform: 'uppercase' }}>{t.week}</div>
          <div className="num" style={{ marginTop: 2, fontSize: 14 }}>{data.weekKwh} kWh</div>
        </div>
        <div>
          <div style={{ color: 'var(--ink-faint)', fontSize: 10, fontFamily: 'JetBrains Mono, monospace', letterSpacing: '0.1em', textTransform: 'uppercase' }}>{t.month}</div>
          <div className="num" style={{ marginTop: 2, fontSize: 14 }}>{data.monthKwh} kWh</div>
        </div>
      </div>
    </Card>
  );
}

function FiltrationCard({ data, t, lang, nowHour }) {
  const running = data.state === 'running';
  let sub;
  if (running && data.runningSince && data.stopsAt) {
    sub = t.pumpSince(data.runningSince, data.stopsAt);
  } else if (!running && data.schedule && data.schedule.length) {
    const last = data.schedule[data.schedule.length - 1];
    sub = t.pumpLastRun(last.from, last.to);
  } else {
    sub = t.pumpIdle;
  }
  return (
    <Card>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
        <div>
          <MicroLabel>{t.filt.label}</MicroLabel>
          <div className="serif" style={{ fontSize: 24, fontWeight: 400, marginTop: 10, letterSpacing: 0.2 }}>
            {running ? t.filt.on : t.filt.off}
          </div>
          <div style={{ fontSize: 12, color: 'var(--ink-dim)', marginTop: 4 }}>
            {sub}
          </div>
        </div>
        <div style={{
          width: 44, height: 44, borderRadius: '50%',
          background: running ? 'rgba(111,185,255,0.12)' : 'rgba(255,255,255,0.04)',
          border: `1px solid ${running ? 'rgba(111,185,255,0.3)' : 'var(--line)'}`,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          color: running ? '#6fb9ff' : 'var(--ink-faint)',
          animation: running ? 'spin-slow 10s linear infinite' : 'none',
        }}>
          {Ico.pump(22, running ? '#6fb9ff' : 'rgba(233,241,247,0.38)')}
        </div>
      </div>

      <div style={{ marginTop: 16 }}>
        <FiltrationStrip schedule={data.schedule} nowHour={nowHour}/>
        <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 8, fontSize: 10, color: 'var(--ink-faint)', fontFamily: 'JetBrains Mono, monospace' }}>
          <span>00h</span><span>06h</span><span>12h</span><span>18h</span><span>24h</span>
        </div>
      </div>

      {data.todayHours != null && (
        <div style={{ marginTop: 12, display: 'flex', justifyContent: 'space-between', fontSize: 12 }}>
          <span style={{ color: 'var(--ink-dim)' }}>{t.today}</span>
          <span className="num" style={{ color: 'var(--ink)' }}>{data.todayHours}h</span>
        </div>
      )}
    </Card>
  );
}

function TickerStat({ label, value, suffix = '', decimals = 1, color }) {
  const has = value != null && Number.isFinite(value);
  return (
    <div>
      <div style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 9, letterSpacing: '0.15em', textTransform: 'uppercase', color: 'var(--ink-faint)' }}>
        {label}
      </div>
      <div className="serif num" style={{ fontSize: 26, fontWeight: 400, letterSpacing: 0, marginTop: 4, color }}>
        {has ? <AnimatedNumber value={value} decimals={decimals}/> : '—'}
        <span style={{ fontSize: 13, color: 'var(--ink-dim)' }}>{suffix}</span>
      </div>
    </div>
  );
}

function Footer({ t }) {
  const [egg, setEgg] = React.useState(false);
  return (
    <div style={{ marginTop: 40, paddingTop: 20, borderTop: '1px solid var(--line)', textAlign: 'center', fontSize: 11, color: 'var(--ink-faint)', fontFamily: 'JetBrains Mono, monospace' }}>
      <div onClick={() => setEgg(e => !e)} style={{ cursor: 'pointer' }}>
        {egg ? t.footerEgg : t.footer}
      </div>
    </div>
  );
}

function SensorWarn({ t, reason }) {
  return (
    <div style={{
      margin: '0 0 14px',
      padding: '10px 12px',
      border: '1px solid rgba(245,184,114,0.3)',
      background: 'rgba(245,184,114,0.08)',
      color: '#f5b872',
      borderRadius: 12,
      fontSize: 12,
      display: 'flex', alignItems: 'center', gap: 10,
    }}>
      <span style={{ flex: '0 0 auto' }}>{Ico.alert(16, '#f5b872')}</span>
      <span style={{ color: 'var(--ink)' }}>
        {t.sensorWarn}{reason ? <span style={{ color: 'var(--ink-dim)' }}> — {reason}</span> : null}
      </span>
    </div>
  );
}

/* ========== Horizon variation shell ========== */

function HorizonView({ data, lang, t, nowHour }) {
  const dateStr = data.now.toLocaleDateString(lang === 'fr' ? 'fr-FR' : 'en-US', { weekday: 'long', day: 'numeric', month: 'long' });
  const timeStr = data.now.toLocaleTimeString(lang === 'fr' ? 'fr-FR' : 'en-US', { hour: '2-digit', minute: '2-digit' });
  const updatedStr = data.updatedAt
    ? data.updatedAt.toLocaleTimeString(lang === 'fr' ? 'fr-FR' : 'en-US', { hour: '2-digit', minute: '2-digit' })
    : '—';

  return (
    <div style={{ padding: '44px 18px 60px', maxWidth: 440, margin: '0 auto' }}>
      <div aria-hidden style={{
        position: 'fixed', inset: 0, zIndex: -1,
        background: `linear-gradient(180deg, #06101c 0%, #05090e 55%, #0a0f16 100%)`,
      }}/>

      {/* Masthead */}
      <div className="rise" style={{ borderBottom: '1px solid var(--line-strong)', paddingBottom: 18, marginBottom: 24, display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end' }}>
        <div>
          <div style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 10, letterSpacing: '0.2em', textTransform: 'uppercase', color: 'var(--ink-faint)' }}>
            № 01 — {dateStr}
          </div>
          <div className="serif" style={{ fontSize: 30, fontWeight: 400, letterSpacing: 0.2, marginTop: 6, lineHeight: 1.1 }}>
            {t.headerTitle1}<br/>
            <span style={{ color: 'var(--ink-dim)' }}>{t.headerTitle2}</span>
          </div>
        </div>
        <div style={{ textAlign: 'right', fontFamily: 'JetBrains Mono, monospace', fontSize: 11, color: 'var(--ink-faint)' }}>
          <div className="num" style={{ color: 'var(--ink)', fontSize: 13 }}>{timeStr}</div>
          <div className="num">{data.location.lat.toFixed(2)}°N</div>
          <div className="num">{data.location.lon.toFixed(2)}°E</div>
        </div>
      </div>

      {/* Live ticker */}
      <div className="rise" style={{ animationDelay: '0.1s', display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 12, marginBottom: 20, padding: '14px 0', borderBottom: '1px solid var(--line)' }}>
        <TickerStat label="Piscine" value={data.pool.temp}   suffix="°"  color="#6fb9ff"/>
        <TickerStat label={lang === 'fr' ? 'Ext.' : 'Out.'} value={data.outdoor.temp} suffix="°" color="#f5b872"/>
        <TickerStat label="Solaire" value={data.solar.nowKw} suffix="kW" decimals={2} color="#9fd8c7"/>
      </div>

      {/* Freshness line */}
      <div className="rise" style={{ animationDelay: '0.12s', display: 'flex', alignItems: 'center', gap: 6, fontSize: 11, color: 'var(--ink-faint)', fontFamily: 'JetBrains Mono, monospace', marginBottom: 18 }}>
        <LiveDot color={data.stale ? '#f5b872' : '#9fd8c7'} size={5}/>
        <span>{t.live} {updatedStr}</span>
      </div>

      {!data.sensorsOk && <SensorWarn t={t} reason={data.reason}/>}

      <div className="rise" style={{ animationDelay: '0.15s' }}>
        <PoolHero data={data.pool} t={t}/>
      </div>
      <div className="rise" style={{ marginTop: 12, animationDelay: '0.25s' }}>
        <SolarCard data={data.solar} t={t} lang={lang} nowHour={nowHour}/>
      </div>
      <div className="rise" style={{ marginTop: 12, animationDelay: '0.35s' }}>
        <OutdoorCard data={data.outdoor} t={t} lang={lang}/>
      </div>
      <div className="rise" style={{ marginTop: 12, animationDelay: '0.45s' }}>
        <FiltrationCard data={data.filtration} t={t} lang={lang} nowHour={nowHour}/>
      </div>

      <Footer t={t}/>
    </div>
  );
}

/* ========== Top-level App ========== */

function safeGetLS(key, fallback = null) {
  try { return localStorage.getItem(key) ?? fallback; } catch (_) { return fallback; }
}
function safeSetLS(key, value) {
  try { localStorage.setItem(key, value); } catch (_) {}
}

function App() {
  const [data, setData] = React.useState(null);
  const [lang, setLang] = React.useState(() => safeGetLS('mp-lang') || (navigator.language && navigator.language.startsWith('en') ? 'en' : 'fr'));

  React.useEffect(() => { safeSetLS('mp-lang', lang); }, [lang]);

  React.useEffect(() => {
    let cancelled = false;
    window.__dataReady.then(d => { if (!cancelled) setData(d); });
    // Refresh every 5 minutes
    const id = setInterval(() => {
      window.loadHouseData && window.loadHouseData().then(d => { if (!cancelled) setData(d); });
    }, 5 * 60 * 1000);
    return () => { cancelled = true; clearInterval(id); };
  }, []);

  const t = STATUS[lang];

  if (!data) {
    return <div className="boot">Chargement</div>;
  }

  return (
    <>
      <div className="lang-toggle" role="group" aria-label="Language">
        <button aria-pressed={lang === 'fr'} onClick={() => setLang('fr')}>FR</button>
        <button aria-pressed={lang === 'en'} onClick={() => setLang('en')}>EN</button>
      </div>
      <HorizonView data={data} lang={lang} t={t} nowHour={new Date().getHours()}/>
    </>
  );
}

// Expose loader for interval refresh
window.loadHouseData = loadHouseData;

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>

<script>
// Service worker registration (kept from previous version)
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
