<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ma Piscine</title>
  <meta name="theme-color" content="#3b82f6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Ma Piscine">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      padding: 16px;
    }

    .container {
      max-width: 420px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0 16px;
    }
    .header-title {
      font-size: 15px;
      font-weight: 600;
      color: #374151;
    }
    .header-time {
      font-size: 12px;
      color: #9ca3af;
    }

    /* Staleness banner */
    .stale-banner {
      background: #dc2626;
      color: white;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      padding: 10px 16px;
      border-radius: 10px;
      margin-bottom: 12px;
      display: none;
    }
    .stale-banner.visible { display: block; }

    /* Hero status card */
    .status-card {
      border-radius: 20px;
      padding: 36px 24px;
      text-align: center;
      margin-bottom: 16px;
      transition: background 0.3s, border-color 0.3s;
    }
    .status-card.ok {
      background: #f0fdf4;
      border: 2px solid #22c55e;
    }
    .status-card.no {
      background: #fef2f2;
      border: 2px solid #ef4444;
    }
    .status-card.loading {
      background: #f9fafb;
      border: 2px solid #e5e7eb;
      animation: pulse 1.5s ease-in-out infinite;
    }
    .status-card.stale {
      background: #fef2f2;
      border: 2px solid #ef4444;
    }
    .status-card.sensors_fail {
      background: #fffbeb;
      border: 2px solid #f59e0b;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    .status-icon { font-size: 60px; margin-bottom: 12px; display: block; }
    .status-label {
      font-size: 24px;
      font-weight: 800;
      color: #111827;
      line-height: 1.2;
      margin-bottom: 8px;
    }
    .status-reason {
      font-size: 14px;
      color: #6b7280;
    }

    /* Metrics grid */
    .metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }
    .metric {
      background: white;
      border-radius: 16px;
      padding: 14px 10px;
      text-align: center;
      border: 1px solid #e5e7eb;
    }
    .metric.loading {
      animation: pulse 1.5s ease-in-out infinite;
    }
    .metric-icon { font-size: 24px; margin-bottom: 6px; display: block; }
    .metric-value {
      font-size: 28px;
      font-weight: 800;
      color: #111827;
      line-height: 1;
    }
    .metric-unit { font-size: 11px; color: #9ca3af; margin-top: 2px; }
    .metric-label { font-size: 12px; color: #6b7280; margin-top: 6px; }

    .metric-value.ok { color: #16a34a; }
    .metric-value.warn { color: #d97706; }
    .metric-value.bad { color: #dc2626; }

    /* Verdict BBQ card */
    .verdict-card {
      background: white;
      border-radius: 16px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
      border: 1px solid #e5e7eb;
    }
    .verdict-card.perfect { border-color: #22c55e; background: #f0fdf4; }
    .verdict-card.bbq { border-color: #f97316; background: #fff7ed; }
    .verdict-card.pool { border-color: #3b82f6; background: #eff6ff; }
    .verdict-card.meh { border-color: #e5e7eb; }
    .verdict-card.cold { border-color: #93c5fd; background: #eff6ff; }
    .verdict-emoji { font-size: 34px; flex-shrink: 0; }
    .verdict-label { font-size: 15px; font-weight: 700; color: #111827; }
    .verdict-sub { font-size: 12px; color: #6b7280; margin-top: 2px; }

    /* Pump row */
    .pump-row {
      background: white;
      border-radius: 16px;
      padding: 16px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      border: 1px solid #e5e7eb;
    }
    .pump-label { font-size: 14px; color: #374151; font-weight: 500; }
    .pump-badge {
      font-size: 12px;
      font-weight: 700;
      padding: 5px 12px;
      border-radius: 20px;
    }
    .pump-badge.on { background: #dcfce7; color: #166534; }
    .pump-badge.off { background: #fee2e2; color: #991b1b; }

    /* Trend card */
    .trend-card {
      background: white;
      border-radius: 16px;
      padding: 14px 16px 12px;
      margin-bottom: 16px;
      border: 1px solid #e5e7eb;
      display: none;
    }
    .trend-card.visible { display: block; }
    .trend-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 8px;
    }
    .trend-title { font-size: 13px; font-weight: 600; color: #374151; }
    .trend-range { font-size: 11px; color: #9ca3af; }
    .trend-card svg { width: 100%; height: 80px; display: block; overflow: visible; }

    /* Forecast card */
    .forecast-card {
      background: white;
      border-radius: 16px;
      padding: 16px 18px;
      display: none;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
      border: 1px solid #e5e7eb;
    }
    .forecast-card.visible { display: flex; }
    .forecast-icon { font-size: 28px; flex-shrink: 0; }
    .forecast-label { font-size: 18px; font-weight: 700; color: #111827; }
    .forecast-sub { font-size: 12px; color: #6b7280; margin-top: 2px; }

    /* Footer */
    .footer {
      text-align: center;
      font-size: 11px;
      color: #d1d5db;
      padding-top: 8px;
    }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <span class="header-title" id="header-title">🏊 Ma Piscine</span>
    <span class="header-time" id="last-updated">—</span>
  </div>

  <div class="stale-banner" id="stale-banner">
    ⚠️ Impossible de vérifier — données trop vieilles
  </div>

  <!-- Hero -->
  <div class="status-card loading" id="status-card">
    <span class="status-icon" id="status-icon">⏳</span>
    <div class="status-label" id="status-label">Chargement…</div>
    <div class="status-reason" id="status-reason"></div>
  </div>

  <!-- Metrics -->
  <div class="metrics">
    <div class="metric loading" id="metric-temp">
      <span class="metric-icon">🌡️</span>
      <div class="metric-value" id="temp-value">—</div>
      <div class="metric-unit">°C</div>
      <div class="metric-label" id="metric-label-temp">Température</div>
    </div>
    <div class="metric loading" id="metric-air-temp">
      <span class="metric-icon">🌤️</span>
      <div class="metric-value" id="air-temp-value">—</div>
      <div class="metric-unit">°C</div>
      <div class="metric-label" id="metric-label-air">Extérieur</div>
    </div>
    <div class="metric loading" id="metric-pump-power">
      <span class="metric-icon">⚡</span>
      <div class="metric-value" id="power-value">—</div>
      <div class="metric-unit">Watts</div>
      <div class="metric-label" id="metric-label-pump">Pompe</div>
    </div>
  </div>

  <!-- Trend sparkline card -->
  <div class="trend-card" id="trend-card">
    <div class="trend-header">
      <span class="trend-title" id="trend-title">📈 Tendance · 7j</span>
      <span class="trend-range" id="trend-range"></span>
    </div>
    <svg id="temp-sparkline" viewBox="0 0 360 80" preserveAspectRatio="none"></svg>
  </div>

  <!-- Forecast card -->
  <div class="forecast-card" id="forecast-card">
    <span class="forecast-icon">🔮</span>
    <div>
      <div class="forecast-label" id="forecast-label">—</div>
      <div class="forecast-sub" id="forecast-sub"></div>
    </div>
  </div>

  <!-- Verdict BBQ + Piscine -->
  <div class="verdict-card" id="verdict-card">
    <span class="verdict-emoji" id="verdict-emoji">⏳</span>
    <div>
      <div class="verdict-label" id="verdict-label">Analyse en cours…</div>
      <div class="verdict-sub" id="verdict-sub"></div>
    </div>
  </div>

  <!-- Pump state row -->
  <div class="pump-row">
    <span class="pump-label" id="pump-label">🔄 Pompe de filtration</span>
    <span class="pump-badge off" id="pump-badge">—</span>
  </div>

  <div class="footer" id="footer">Source : Home Assistant</div>

</div>

<script>
  // ── i18n ─────────────────────────────────────────────────────────────────
  const lang = navigator.language.startsWith('fr') ? 'fr' : 'en';
  document.documentElement.lang = lang;

  const S = {
    fr: {
      page_title:        'Ma Piscine',
      header_title:      '🏊 Ma Piscine',
      stale_banner:      '⚠️ Impossible de vérifier — données trop vieilles',
      status_loading:    'Chargement…',
      status_analysis:   'Analyse en cours…',
      status_stale:      'Impossible de vérifier',
      status_stale_sub:  'Données trop vieilles — vérifier la connexion HA',
      sensor_fail:       'Capteur indétectable',
      sensor_fail_sub:   'Vérifier HA — capteur hors ligne',
      status_ok:         'Eau OK pour se baigner !',
      status_no:         'Pas de baignade pour l\'instant',
      error_label:       'Erreur de chargement',
      error_sub:         'Vérifier la connexion et réessayer',
      label_water:       'Température',
      label_air:         'Extérieur',
      label_pump:        'Pompe',
      pump_row:          '🔄 Pompe de filtration',
      pump_on:           'EN MARCHE',
      pump_off:          'À L\'ARRÊT',
      time_now:          'à l\'instant',
      time_min1:         'il y a 1 min',
      time_mins:         'il y a {n} min',
      time_h1:           'il y a 1 h',
      time_hrs:          'il y a {n} h',
      time_unknown:      'Heure inconnue',
      verdict_no_air:    'Données ext. indisponibles',
      v_perfect_l:       'Journée parfaite !',
      v_perfect_s:       'BBQ + piscine — tout est réuni !',
      v_bbq_l:           'Top pour un BBQ !',
      v_bbq_s_soon:      'La piscine sera bientôt prête',
      v_bbq_s_not:       'Piscine pas encore prête',
      v_pool_l:          'Bonne baignade !',
      v_pool_s:          'Il fait un peu frais dehors',
      v_meh_l:           'Journée correcte',
      v_meh_s:           'Ni vraiment BBQ ni vraiment piscine',
      v_cold_l:          'Patience…',
      v_cold_s:          'La belle saison arrive !',
      trend_title:       '📈 Tendance · 7j',
      trend_range:       'Min {min}° · Max {max}°',
      fc_insufficient:   'Données insuffisantes',
      fc_stable:         'Stable',
      fc_stable_s:       '{t}°C — pas de tendance',
      fc_cooling:        'Refroidit',
      fc_cooling_s:      '{t}°C en baisse',
      fc_not_today:      'Pas aujourd\'hui',
      fc_not_today_s:    '{t}°C — chauffe trop lentement',
      fc_ready:          'Prête vers {time}',
      fc_ready_s:        '{t}°C — ça monte !',
      footer:            'Source : Home Assistant',
    },
    en: {
      page_title:        'My Pool',
      header_title:      '🏊 My Pool',
      stale_banner:      '⚠️ Cannot verify — data too old',
      status_loading:    'Loading…',
      status_analysis:   'Analysing…',
      status_stale:      'Cannot verify',
      status_stale_sub:  'Data too old — check HA connection',
      sensor_fail:       'Sensor unavailable',
      sensor_fail_sub:   'Check Home Assistant — sensor offline',
      status_ok:         'Pool ready for swimming!',
      status_no:         'Not ready for swimming yet',
      error_label:       'Loading error',
      error_sub:         'Check connection and try again',
      label_water:       'Temperature',
      label_air:         'Outdoor',
      label_pump:        'Pump',
      pump_row:          '🔄 Filter pump',
      pump_on:           'RUNNING',
      pump_off:          'OFF',
      time_now:          'just now',
      time_min1:         '1 min ago',
      time_mins:         '{n} min ago',
      time_h1:           '1 h ago',
      time_hrs:          '{n} h ago',
      time_unknown:      'Unknown time',
      verdict_no_air:    'Outdoor data unavailable',
      v_perfect_l:       'Perfect day!',
      v_perfect_s:       'BBQ + pool — everything\'s set!',
      v_bbq_l:           'Great BBQ weather!',
      v_bbq_s_soon:      'Pool will be ready soon',
      v_bbq_s_not:       'Pool not quite ready',
      v_pool_l:          'Good swim!',
      v_pool_s:          'A bit cool outside',
      v_meh_l:           'Decent day',
      v_meh_s:           'Not really BBQ or pool weather',
      v_cold_l:          'Be patient…',
      v_cold_s:          'Summer is coming!',
      trend_title:       '📈 Trend · 7d',
      trend_range:       'Min {min}° · Max {max}°',
      fc_insufficient:   'Insufficient data',
      fc_stable:         'Stable',
      fc_stable_s:       '{t}°C — no trend',
      fc_cooling:        'Cooling down',
      fc_cooling_s:      '{t}°C — dropping',
      fc_not_today:      'Not today',
      fc_not_today_s:    '{t}°C — warming too slowly',
      fc_ready:          'Ready around {time}',
      fc_ready_s:        '{t}°C — warming up!',
      footer:            'Source: Home Assistant',
    }
  };

  function t(key, p) {
    let s = (S[lang] || S.fr)[key] || key;
    if (p) Object.entries(p).forEach(([k, v]) => { s = s.replace('{' + k + '}', v); });
    return s;
  }

  function initUI() {
    document.title = t('page_title');
    document.getElementById('header-title').textContent   = t('header_title');
    document.getElementById('stale-banner').textContent   = t('stale_banner');
    document.getElementById('status-label').textContent   = t('status_loading');
    document.getElementById('verdict-label').textContent  = t('status_analysis');
    document.getElementById('metric-label-temp').textContent = t('label_water');
    document.getElementById('metric-label-air').textContent  = t('label_air');
    document.getElementById('metric-label-pump').textContent = t('label_pump');
    document.getElementById('trend-title').textContent    = t('trend_title');
    document.getElementById('pump-label').textContent     = t('pump_row');
    document.getElementById('footer').textContent         = t('footer');
  }

  // ── Core ──────────────────────────────────────────────────────────────────
  const STALE_THRESHOLD_MS = 15 * 60 * 1000;

  function computeVerdict(tempAir, tempWater, swimmable, pumpOn) {
    if (isNaN(tempAir)) return { cls: 'meh', emoji: '🤔', label: t('verdict_no_air'), sub: '' };
    const bbqOk = tempAir >= 22, poolSoon = pumpOn && tempWater >= 18;
    if (bbqOk && swimmable) return { cls: 'perfect', emoji: '🎉', label: t('v_perfect_l'), sub: t('v_perfect_s') };
    if (bbqOk && poolSoon)  return { cls: 'bbq',     emoji: '🔥', label: t('v_bbq_l'),    sub: t('v_bbq_s_soon') };
    if (bbqOk)              return { cls: 'bbq',     emoji: '🔥', label: t('v_bbq_l'),    sub: t('v_bbq_s_not') };
    if (swimmable)          return { cls: 'pool',    emoji: '🏊', label: t('v_pool_l'),   sub: t('v_pool_s') };
    if (tempAir >= 18)      return { cls: 'meh',     emoji: '⛅', label: t('v_meh_l'),    sub: t('v_meh_s') };
    return                         { cls: 'cold',    emoji: '❄️', label: t('v_cold_l'),   sub: t('v_cold_s') };
  }

  function timeAgo(dateStr) {
    const diff = Date.now() - new Date(dateStr).getTime();
    const mins = Math.floor(diff / 60000);
    if (mins < 1)  return t('time_now');
    if (mins === 1) return t('time_min1');
    if (mins < 60) return t('time_mins', { n: mins });
    const hrs = Math.floor(mins / 60);
    if (hrs === 1) return t('time_h1');
    return t('time_hrs', { n: hrs });
  }

  function applyData(d) {
    const updatedAt = d.updated_at ? new Date(d.updated_at) : null;
    const isStale = !updatedAt || (Date.now() - updatedAt.getTime() > STALE_THRESHOLD_MS);

    if (isStale) {
      document.getElementById('stale-banner').classList.add('visible');
      const card = document.getElementById('status-card');
      card.className = 'status-card stale';
      document.getElementById('status-icon').textContent  = '🔴';
      document.getElementById('status-label').textContent = t('status_stale');
      document.getElementById('status-reason').textContent = t('status_stale_sub');
    } else {
      document.getElementById('stale-banner').classList.remove('visible');
      const card = document.getElementById('status-card');
      if (d.sensors_ok === false) {
        card.className = 'status-card sensors_fail';
        document.getElementById('status-icon').textContent  = '⚠️';
        document.getElementById('status-label').textContent = t('sensor_fail');
        document.getElementById('status-reason').textContent = t('sensor_fail_sub');
      } else {
        card.className = d.swimmable ? 'status-card ok' : 'status-card no';
        document.getElementById('status-icon').textContent  = d.swimmable ? '🟢' : '🔴';
        document.getElementById('status-label').textContent = t(d.swimmable ? 'status_ok' : 'status_no');
        document.getElementById('status-reason').textContent = '';
      }
    }

    const tempC = parseFloat(d.temp_water_c);
    const tempEl = document.getElementById('temp-value');
    if (!isNaN(tempC)) {
      tempEl.textContent  = tempC.toFixed(1);
      tempEl.className = 'metric-value ' + (tempC >= 24 ? 'ok' : tempC >= 20 ? 'warn' : 'bad');
    }
    document.getElementById('metric-temp').classList.remove('loading');
    if (!isNaN(tempC)) { lastKnownTempC = tempC; renderForecast(tempC); }

    const tempAir = parseFloat(d.temp_air_c);
    const airEl = document.getElementById('air-temp-value');
    if (!isNaN(tempAir)) {
      airEl.textContent = tempAir.toFixed(1);
      airEl.className = 'metric-value ' + (tempAir >= 25 ? 'ok' : tempAir >= 20 ? 'warn' : 'bad');
    }
    document.getElementById('metric-air-temp').classList.remove('loading');

    const verdict = computeVerdict(tempAir, tempC, d.swimmable, d.pump_on);
    const vCard = document.getElementById('verdict-card');
    vCard.className = 'verdict-card ' + verdict.cls;
    document.getElementById('verdict-emoji').textContent = verdict.emoji;
    document.getElementById('verdict-label').textContent = verdict.label;
    document.getElementById('verdict-sub').textContent   = verdict.sub;

    const powerW = parseFloat(d.pump_power_w);
    const powerEl = document.getElementById('power-value');
    if (!isNaN(powerW)) {
      powerEl.textContent = powerW.toFixed(0);
      powerEl.className = 'metric-value ' + (powerW > 0 ? 'ok' : '');
    }
    document.getElementById('metric-pump-power').classList.remove('loading');

    const pumpBadge = document.getElementById('pump-badge');
    pumpBadge.className   = 'pump-badge ' + (d.pump_on ? 'on' : 'off');
    pumpBadge.textContent = t(d.pump_on ? 'pump_on' : 'pump_off');

    document.getElementById('last-updated').textContent =
      updatedAt ? timeAgo(d.updated_at) : t('time_unknown');
  }

  let lastGoodData = null;
  let historyEntries = [];
  let lastKnownTempC = null;

  function renderSparkline(entries) {
    const card = document.getElementById('trend-card');
    const svg = document.getElementById('temp-sparkline');
    if (!entries || entries.length < 2) return;
    const w288 = entries.slice(-2016);
    const temps = w288.map(e => e.temp_water_c).filter(t => typeof t === 'number' && !isNaN(t));
    if (temps.length < 2) return;

    const VW = 360, VH = 80;
    const PL = 26, PR = 6, PT = 6, PB = 6;
    const cW = VW - PL - PR, cH = VH - PT - PB;

    const minT = Math.min(...temps), maxT = Math.max(...temps);
    const lo = Math.max(0, minT - 0.8), hi = maxT + 0.8;
    const span = hi - lo || 1;

    const px = i => PL + (i / (temps.length - 1)) * cW;
    const py = t => PT + (1 - (t - lo) / span) * cH;

    const pts = temps.map((t, i) => px(i).toFixed(1) + ',' + py(t).toFixed(1)).join(' ');

    const lastX = px(temps.length - 1), lastY = py(temps[temps.length - 1]);
    const lastT = temps[temps.length - 1];
    const dotColor = lastT >= 20 ? '#16a34a' : '#3b82f6';

    // Area fill path
    const areaD = 'M' + px(0).toFixed(1) + ',' + py(temps[0]).toFixed(1) +
      temps.slice(1).map((t, i) => ' L' + px(i + 1).toFixed(1) + ',' + py(t).toFixed(1)).join('') +
      ' L' + lastX.toFixed(1) + ',' + (PT + cH) + ' L' + PL + ',' + (PT + cH) + ' Z';

    // 20°C swim threshold line
    const y20 = py(20);
    const show20 = y20 >= PT && y20 <= PT + cH;

    // Y-axis labels: only show if they don't overlap (8px gap)
    const yMax = py(maxT), yMin = py(minT);
    const showMax = true;
    const showMin = Math.abs(yMin - yMax) > 14;
    const showMinUnder20 = show20 && Math.abs(yMin - y20) < 10;
    const showMaxUnder20 = show20 && Math.abs(yMax - y20) < 10;

    svg.innerHTML =
      '<defs>' +
        '<linearGradient id="aG" x1="0" y1="0" x2="0" y2="1">' +
          '<stop offset="0%" stop-color="#3b82f6" stop-opacity="0.25"/>' +
          '<stop offset="100%" stop-color="#3b82f6" stop-opacity="0.03"/>' +
        '</linearGradient>' +
      '</defs>' +
      '<path d="' + areaD + '" fill="url(#aG)"/>' +
      (show20 && !showMinUnder20 && !showMaxUnder20
        ? '<line x1="' + PL + '" y1="' + y20.toFixed(1) + '" x2="' + (VW - PR) + '" y2="' + y20.toFixed(1) +
          '" stroke="#22c55e" stroke-width="1" stroke-dasharray="4,3" opacity="0.7"/>' +
          '<text x="' + (PL - 3) + '" y="' + (y20 + 3.5).toFixed(1) + '" fill="#16a34a" font-size="9" text-anchor="end">20°</text>'
        : '') +
      '<polyline points="' + pts + '" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>' +
      (showMax
        ? '<text x="' + (PL - 3) + '" y="' + (yMax + 3.5).toFixed(1) + '" fill="#94a3b8" font-size="9" text-anchor="end">' + maxT.toFixed(1) + '°</text>'
        : '') +
      (showMin
        ? '<text x="' + (PL - 3) + '" y="' + (yMin + 3.5).toFixed(1) + '" fill="#94a3b8" font-size="9" text-anchor="end">' + minT.toFixed(1) + '°</text>'
        : '') +
      '<circle cx="' + lastX.toFixed(1) + '" cy="' + lastY.toFixed(1) + '" r="3.5" fill="' + dotColor + '" stroke="white" stroke-width="1.5"/>';

    document.getElementById('trend-range').textContent =
      t('trend_range', { min: minT.toFixed(1), max: maxT.toFixed(1) });
    card.classList.add('visible');
  }

  function computeForecast(entries, currentTemp) {
    if (currentTemp >= 20) return null;
    const tc = currentTemp.toFixed(1);
    if (!entries || entries.length < 12) return { text: t('fc_insufficient'), sub: '' };
    const w = entries.slice(-12);
    const first = w[0], last = w[w.length - 1];
    const dtMs = new Date(last.ts) - new Date(first.ts);
    if (dtMs <= 0) return { text: t('fc_insufficient'), sub: '' };
    const slope = (last.temp_water_c - first.temp_water_c) / dtMs;
    const THRESHOLD = 0.01 / 3600000;
    if (Math.abs(slope) < THRESHOLD) return { text: t('fc_stable'), sub: t('fc_stable_s', { t: tc }) };
    if (slope < -THRESHOLD) return { text: t('fc_cooling'), sub: t('fc_cooling_s', { t: tc }) };
    const etaMs = (20 - currentTemp) / slope;
    if (etaMs > 24 * 3600000) return { text: t('fc_not_today'), sub: t('fc_not_today_s', { t: tc }) };
    const eta = new Date(Date.now() + etaMs);
    const h = eta.getHours(), m = eta.getMinutes();
    let timeStr;
    if (lang === 'fr') {
      timeStr = m < 15 ? h + 'h' : m < 45 ? h + 'h30' : ((h + 1) % 24) + 'h';
    } else {
      const bH = m < 45 ? h : (h + 1) % 24;
      const h12 = bH % 12 || 12;
      const ampm = bH < 12 ? 'AM' : 'PM';
      timeStr = m < 15 ? h12 + ' ' + ampm : m < 45 ? h12 + ':30 ' + ampm : h12 + ' ' + ampm;
    }
    return { text: t('fc_ready', { time: timeStr }), sub: t('fc_ready_s', { t: tc }) };
  }

  function renderForecast(tempC) {
    const forecast = computeForecast(historyEntries, tempC);
    const card = document.getElementById('forecast-card');
    if (!forecast) { card.classList.remove('visible'); return; }
    card.classList.add('visible');
    document.getElementById('forecast-label').textContent = forecast.text;
    document.getElementById('forecast-sub').textContent = forecast.sub;
  }

  async function fetchHistory() {
    try {
      const res = await fetch('history.json?ts=' + Date.now());
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      historyEntries = data.entries || [];
      renderSparkline(historyEntries);
      if (lastKnownTempC !== null) renderForecast(lastKnownTempC);
    } catch (e) {
      // history unavailable — sparkline and forecast stay hidden
    }
  }

  async function fetchStatus() {
    try {
      const res = await fetch('status.json?ts=' + Date.now());
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json(); // peut throw SyntaxError si JSON corrompu
      lastGoodData = data;
      localStorage.setItem('lastStatus', JSON.stringify(data));
      applyData(data);
    } catch (e) {
      // Fallback localStorage
      const cached = localStorage.getItem('lastStatus');
      if (cached) {
        try {
          applyData(JSON.parse(cached));
        } catch (_) {
          showError();
        }
      } else {
        showError();
      }
    }
  }

  function showError() {
    const card = document.getElementById('status-card');
    card.className = 'status-card no';
    document.getElementById('status-icon').textContent = '⚠️';
    document.getElementById('status-label').textContent = t('error_label');
    document.getElementById('status-reason').textContent = t('error_sub');
    document.getElementById('metric-temp').classList.remove('loading');
    document.getElementById('metric-air-temp').classList.remove('loading');
    document.getElementById('metric-pump-power').classList.remove('loading');
  }

  // Initial load + refresh toutes les 5 min
  initUI();
  fetchStatus();
  fetchHistory();
  setInterval(fetchStatus, 5 * 60 * 1000);
  setInterval(fetchHistory, 5 * 60 * 1000);

  // Service worker (PWA offline support)
  if ('serviceWorker' in navigator) {
    try { navigator.serviceWorker.register('sw.js'); } catch (_) {}
  }
</script>
</body>
</html>
