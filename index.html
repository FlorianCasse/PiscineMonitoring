<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ma Piscine</title>
  <meta name="theme-color" content="#3b82f6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Ma Piscine">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      padding: 16px;
    }

    .container {
      max-width: 420px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0 16px;
    }
    .header-title {
      font-size: 15px;
      font-weight: 600;
      color: #374151;
    }
    .header-time {
      font-size: 12px;
      color: #9ca3af;
    }

    /* Staleness banner */
    .stale-banner {
      background: #dc2626;
      color: white;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      padding: 10px 16px;
      border-radius: 10px;
      margin-bottom: 12px;
      display: none;
    }
    .stale-banner.visible { display: block; }

    /* Hero status card */
    .status-card {
      border-radius: 20px;
      padding: 36px 24px;
      text-align: center;
      margin-bottom: 16px;
      transition: background 0.3s, border-color 0.3s;
    }
    .status-card.ok {
      background: #f0fdf4;
      border: 2px solid #22c55e;
    }
    .status-card.no {
      background: #fef2f2;
      border: 2px solid #ef4444;
    }
    .status-card.loading {
      background: #f9fafb;
      border: 2px solid #e5e7eb;
      animation: pulse 1.5s ease-in-out infinite;
    }
    .status-card.stale {
      background: #fef2f2;
      border: 2px solid #ef4444;
    }
    .status-card.sensors_fail {
      background: #fffbeb;
      border: 2px solid #f59e0b;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    .status-icon { font-size: 60px; margin-bottom: 12px; display: block; }
    .status-label {
      font-size: 24px;
      font-weight: 800;
      color: #111827;
      line-height: 1.2;
      margin-bottom: 8px;
    }
    .status-reason {
      font-size: 14px;
      color: #6b7280;
    }

    /* Metrics grid */
    .metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }
    .metric {
      background: white;
      border-radius: 16px;
      padding: 14px 10px;
      text-align: center;
      border: 1px solid #e5e7eb;
    }
    .metric.loading {
      animation: pulse 1.5s ease-in-out infinite;
    }
    .metric-icon { font-size: 24px; margin-bottom: 6px; display: block; }
    .metric-value {
      font-size: 28px;
      font-weight: 800;
      color: #111827;
      line-height: 1;
    }
    .metric-unit { font-size: 11px; color: #9ca3af; margin-top: 2px; }
    .metric-label { font-size: 12px; color: #6b7280; margin-top: 6px; }

    .metric-value.ok { color: #16a34a; }
    .metric-value.warn { color: #d97706; }
    .metric-value.bad { color: #dc2626; }

    /* Verdict BBQ card */
    .verdict-card {
      background: white;
      border-radius: 16px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
      border: 1px solid #e5e7eb;
    }
    .verdict-card.perfect { border-color: #22c55e; background: #f0fdf4; }
    .verdict-card.bbq { border-color: #f97316; background: #fff7ed; }
    .verdict-card.pool { border-color: #3b82f6; background: #eff6ff; }
    .verdict-card.meh { border-color: #e5e7eb; }
    .verdict-card.cold { border-color: #93c5fd; background: #eff6ff; }
    .verdict-emoji { font-size: 34px; flex-shrink: 0; }
    .verdict-label { font-size: 15px; font-weight: 700; color: #111827; }
    .verdict-sub { font-size: 12px; color: #6b7280; margin-top: 2px; }

    /* Pump row */
    .pump-row {
      background: white;
      border-radius: 16px;
      padding: 16px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      border: 1px solid #e5e7eb;
    }
    .pump-label { font-size: 14px; color: #374151; font-weight: 500; }
    .pump-badge {
      font-size: 12px;
      font-weight: 700;
      padding: 5px 12px;
      border-radius: 20px;
    }
    .pump-badge.on { background: #dcfce7; color: #166534; }
    .pump-badge.off { background: #fee2e2; color: #991b1b; }

    /* Trend card */
    .trend-card {
      background: white;
      border-radius: 16px;
      padding: 14px 16px 12px;
      margin-bottom: 16px;
      border: 1px solid #e5e7eb;
      display: none;
    }
    .trend-card.visible { display: block; }
    .trend-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 8px;
    }
    .trend-title { font-size: 13px; font-weight: 600; color: #374151; }
    .trend-range { font-size: 11px; color: #9ca3af; }
    .trend-card svg { width: 100%; height: 80px; display: block; overflow: visible; }

    /* Forecast card */
    .forecast-card {
      background: white;
      border-radius: 16px;
      padding: 16px 18px;
      display: none;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
      border: 1px solid #e5e7eb;
    }
    .forecast-card.visible { display: flex; }
    .forecast-icon { font-size: 28px; flex-shrink: 0; }
    .forecast-label { font-size: 18px; font-weight: 700; color: #111827; }
    .forecast-sub { font-size: 12px; color: #6b7280; margin-top: 2px; }

    /* Footer */
    .footer {
      text-align: center;
      font-size: 11px;
      color: #d1d5db;
      padding-top: 8px;
    }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <span class="header-title">🏊 Ma Piscine</span>
    <span class="header-time" id="last-updated">—</span>
  </div>

  <div class="stale-banner" id="stale-banner">
    ⚠️ Impossible de vérifier — données trop vieilles
  </div>

  <!-- Hero -->
  <div class="status-card loading" id="status-card">
    <span class="status-icon" id="status-icon">⏳</span>
    <div class="status-label" id="status-label">Chargement…</div>
    <div class="status-reason" id="status-reason"></div>
  </div>

  <!-- Metrics -->
  <div class="metrics">
    <div class="metric loading" id="metric-temp">
      <span class="metric-icon">🌡️</span>
      <div class="metric-value" id="temp-value">—</div>
      <div class="metric-unit">°C</div>
      <div class="metric-label">Température</div>
    </div>
    <div class="metric loading" id="metric-air-temp">
      <span class="metric-icon">🌤️</span>
      <div class="metric-value" id="air-temp-value">—</div>
      <div class="metric-unit">°C</div>
      <div class="metric-label">Extérieur</div>
    </div>
    <div class="metric loading" id="metric-pump-power">
      <span class="metric-icon">⚡</span>
      <div class="metric-value" id="power-value">—</div>
      <div class="metric-unit">Watts</div>
      <div class="metric-label">Pompe</div>
    </div>
  </div>

  <!-- Trend sparkline card -->
  <div class="trend-card" id="trend-card">
    <div class="trend-header">
      <span class="trend-title">📈 Tendance · 24h</span>
      <span class="trend-range" id="trend-range"></span>
    </div>
    <svg id="temp-sparkline" viewBox="0 0 360 80" preserveAspectRatio="none"></svg>
  </div>

  <!-- Forecast card -->
  <div class="forecast-card" id="forecast-card">
    <span class="forecast-icon">🔮</span>
    <div>
      <div class="forecast-label" id="forecast-label">—</div>
      <div class="forecast-sub" id="forecast-sub"></div>
    </div>
  </div>

  <!-- Verdict BBQ + Piscine -->
  <div class="verdict-card" id="verdict-card">
    <span class="verdict-emoji" id="verdict-emoji">⏳</span>
    <div>
      <div class="verdict-label" id="verdict-label">Analyse en cours…</div>
      <div class="verdict-sub" id="verdict-sub"></div>
    </div>
  </div>

  <!-- Pump state row -->
  <div class="pump-row">
    <span class="pump-label">🔄 Pompe de filtration</span>
    <span class="pump-badge off" id="pump-badge">—</span>
  </div>

  <div class="footer" id="footer">Source : Home Assistant</div>

</div>

<script>
  const STALE_THRESHOLD_MS = 15 * 60 * 1000; // 15 minutes

  function computeVerdict(tempAir, tempWater, swimmable, pumpOn) {
    if (isNaN(tempAir)) return { cls: 'meh', emoji: '🤔', label: 'Données ext. indisponibles', sub: '' };
    const bbqOk = tempAir >= 22;
    const poolSoon = pumpOn && tempWater >= 18;
    if (bbqOk && swimmable)        return { cls: 'perfect', emoji: '🎉', label: 'Journée parfaite !',     sub: 'BBQ + piscine — tout est réuni !' };
    if (bbqOk && poolSoon)         return { cls: 'bbq',     emoji: '🔥', label: 'Top pour un BBQ !',      sub: 'La piscine sera bientôt prête' };
    if (bbqOk)                     return { cls: 'bbq',     emoji: '🔥', label: 'Top pour un BBQ !',      sub: 'Piscine pas encore prête' };
    if (swimmable)                 return { cls: 'pool',    emoji: '🏊', label: 'Bonne baignade !',       sub: 'Il fait un peu frais dehors' };
    if (tempAir >= 18)             return { cls: 'meh',     emoji: '⛅', label: 'Journée correcte',      sub: 'Ni vraiment BBQ ni vraiment piscine' };
    return                                { cls: 'cold',    emoji: '❄️', label: 'Patience…',              sub: 'La belle saison arrive !' };
  }

  function timeAgo(dateStr) {
    const diff = Date.now() - new Date(dateStr).getTime();
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return "à l'instant";
    if (mins === 1) return "il y a 1 min";
    if (mins < 60) return `il y a ${mins} min`;
    const hrs = Math.floor(mins / 60);
    if (hrs === 1) return "il y a 1 h";
    return `il y a ${hrs} h`;
  }

  function applyData(d) {
    const updatedAt = d.updated_at ? new Date(d.updated_at) : null;
    const isStale = !updatedAt || (Date.now() - updatedAt.getTime() > STALE_THRESHOLD_MS);

    // Stale → force rouge + banner
    if (isStale) {
      document.getElementById('stale-banner').classList.add('visible');
      const card = document.getElementById('status-card');
      card.className = 'status-card stale';
      document.getElementById('status-icon').textContent = '🔴';
      document.getElementById('status-label').textContent = 'Impossible de vérifier';
      document.getElementById('status-reason').textContent = 'Données trop vieilles — vérifier la connexion HA';
    } else {
      document.getElementById('stale-banner').classList.remove('visible');
      const card = document.getElementById('status-card');
      if (d.sensors_ok === false) {
        card.className = 'status-card sensors_fail';
        document.getElementById('status-icon').textContent = '⚠️';
        document.getElementById('status-label').textContent = 'Capteur indétectable';
        document.getElementById('status-reason').textContent = 'Vérifier HA — capteur hors ligne';
      } else {
        card.className = d.swimmable ? 'status-card ok' : 'status-card no';
        document.getElementById('status-icon').textContent = d.swimmable ? '🟢' : '🔴';
        // textContent only — jamais innerHTML (XSS prevention)
        document.getElementById('status-label').textContent = d.swimmable ? 'Eau OK pour se baigner !' : 'Pas de baignade pour l\'instant';
        document.getElementById('status-reason').textContent = d.reason || '';
      }
    }

    // Température
    const tempC = parseFloat(d.temp_water_c);
    const tempEl = document.getElementById('temp-value');
    if (!isNaN(tempC)) {
      tempEl.textContent = tempC.toFixed(1);
      tempEl.className = 'metric-value ' + (tempC >= 24 ? 'ok' : tempC >= 20 ? 'warn' : 'bad');
    }
    document.getElementById('metric-temp').classList.remove('loading');
    if (!isNaN(tempC)) renderForecast(tempC);

    // Température extérieure
    const tempAir = parseFloat(d.temp_air_c);
    const airEl = document.getElementById('air-temp-value');
    if (!isNaN(tempAir)) {
      airEl.textContent = tempAir.toFixed(1);
      airEl.className = 'metric-value ' + (tempAir >= 25 ? 'ok' : tempAir >= 20 ? 'warn' : 'bad');
    }
    document.getElementById('metric-air-temp').classList.remove('loading');

    // Verdict BBQ + Piscine
    const verdict = computeVerdict(tempAir, tempC, d.swimmable, d.pump_on);
    const vCard = document.getElementById('verdict-card');
    vCard.className = 'verdict-card ' + verdict.cls;
    document.getElementById('verdict-emoji').textContent = verdict.emoji;
    document.getElementById('verdict-label').textContent = verdict.label;
    document.getElementById('verdict-sub').textContent = verdict.sub;

    // Puissance pompe
    const powerW = parseFloat(d.pump_power_w);
    const powerEl = document.getElementById('power-value');
    if (!isNaN(powerW)) {
      powerEl.textContent = powerW.toFixed(0);
      powerEl.className = 'metric-value ' + (powerW > 0 ? 'ok' : '');
    }
    document.getElementById('metric-pump-power').classList.remove('loading');

    // Badge pompe
    const pumpBadge = document.getElementById('pump-badge');
    pumpBadge.className = 'pump-badge ' + (d.pump_on ? 'on' : 'off');
    pumpBadge.textContent = d.pump_on ? 'EN MARCHE' : 'À L\'ARRÊT';

    // Timestamp
    document.getElementById('last-updated').textContent = updatedAt ? timeAgo(d.updated_at) : 'Heure inconnue';
  }

  let lastGoodData = null;
  let historyEntries = [];

  function renderSparkline(entries) {
    const card = document.getElementById('trend-card');
    const svg = document.getElementById('temp-sparkline');
    if (!entries || entries.length < 2) return;
    const w288 = entries.slice(-288);
    const temps = w288.map(e => e.temp_water_c).filter(t => typeof t === 'number' && !isNaN(t));
    if (temps.length < 2) return;

    const VW = 360, VH = 80;
    const PL = 26, PR = 6, PT = 6, PB = 6;
    const cW = VW - PL - PR, cH = VH - PT - PB;

    const minT = Math.min(...temps), maxT = Math.max(...temps);
    const lo = Math.max(0, minT - 0.8), hi = maxT + 0.8;
    const span = hi - lo || 1;

    const px = i => PL + (i / (temps.length - 1)) * cW;
    const py = t => PT + (1 - (t - lo) / span) * cH;

    const pts = temps.map((t, i) => px(i).toFixed(1) + ',' + py(t).toFixed(1)).join(' ');

    const lastX = px(temps.length - 1), lastY = py(temps[temps.length - 1]);
    const lastT = temps[temps.length - 1];
    const dotColor = lastT >= 20 ? '#16a34a' : '#3b82f6';

    // Area fill path
    const areaD = 'M' + px(0).toFixed(1) + ',' + py(temps[0]).toFixed(1) +
      temps.slice(1).map((t, i) => ' L' + px(i + 1).toFixed(1) + ',' + py(t).toFixed(1)).join('') +
      ' L' + lastX.toFixed(1) + ',' + (PT + cH) + ' L' + PL + ',' + (PT + cH) + ' Z';

    // 20°C swim threshold line
    const y20 = py(20);
    const show20 = y20 >= PT && y20 <= PT + cH;

    // Y-axis labels: only show if they don't overlap (8px gap)
    const yMax = py(maxT), yMin = py(minT);
    const showMax = true;
    const showMin = Math.abs(yMin - yMax) > 14;
    const showMinUnder20 = show20 && Math.abs(yMin - y20) < 10;
    const showMaxUnder20 = show20 && Math.abs(yMax - y20) < 10;

    svg.innerHTML =
      '<defs>' +
        '<linearGradient id="aG" x1="0" y1="0" x2="0" y2="1">' +
          '<stop offset="0%" stop-color="#3b82f6" stop-opacity="0.25"/>' +
          '<stop offset="100%" stop-color="#3b82f6" stop-opacity="0.03"/>' +
        '</linearGradient>' +
      '</defs>' +
      '<path d="' + areaD + '" fill="url(#aG)"/>' +
      (show20 && !showMinUnder20 && !showMaxUnder20
        ? '<line x1="' + PL + '" y1="' + y20.toFixed(1) + '" x2="' + (VW - PR) + '" y2="' + y20.toFixed(1) +
          '" stroke="#22c55e" stroke-width="1" stroke-dasharray="4,3" opacity="0.7"/>' +
          '<text x="' + (PL - 3) + '" y="' + (y20 + 3.5).toFixed(1) + '" fill="#16a34a" font-size="9" text-anchor="end">20°</text>'
        : '') +
      '<polyline points="' + pts + '" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>' +
      (showMax
        ? '<text x="' + (PL - 3) + '" y="' + (yMax + 3.5).toFixed(1) + '" fill="#94a3b8" font-size="9" text-anchor="end">' + maxT.toFixed(1) + '°</text>'
        : '') +
      (showMin
        ? '<text x="' + (PL - 3) + '" y="' + (yMin + 3.5).toFixed(1) + '" fill="#94a3b8" font-size="9" text-anchor="end">' + minT.toFixed(1) + '°</text>'
        : '') +
      '<circle cx="' + lastX.toFixed(1) + '" cy="' + lastY.toFixed(1) + '" r="3.5" fill="' + dotColor + '" stroke="white" stroke-width="1.5"/>';

    document.getElementById('trend-range').textContent =
      'Min ' + minT.toFixed(1) + '° · Max ' + maxT.toFixed(1) + '°';
    card.classList.add('visible');
  }

  function computeForecast(entries, currentTemp) {
    if (currentTemp >= 20) return null;
    if (!entries || entries.length < 12) return { text: 'Données insuffisantes', sub: '' };
    const w = entries.slice(-12);
    const first = w[0], last = w[w.length - 1];
    const dtMs = new Date(last.ts) - new Date(first.ts);
    if (dtMs <= 0) return { text: 'Données insuffisantes', sub: '' };
    const slope = (last.temp_water_c - first.temp_water_c) / dtMs;
    const THRESHOLD = 0.01 / 3600000;
    if (Math.abs(slope) < THRESHOLD) return { text: 'Stable', sub: currentTemp.toFixed(1) + '°C — pas de tendance' };
    if (slope < -THRESHOLD) return { text: 'Refroidit', sub: currentTemp.toFixed(1) + '°C en baisse' };
    const etaMs = (20 - currentTemp) / slope;
    if (etaMs > 24 * 3600000) return { text: "Pas aujourd'hui", sub: currentTemp.toFixed(1) + '°C — chauffe trop lentement' };
    const eta = new Date(Date.now() + etaMs);
    const h = eta.getHours(), m = eta.getMinutes();
    const timeStr = m < 15 ? h + 'h' : m < 45 ? h + 'h30' : ((h + 1) % 24) + 'h';
    return { text: 'Prête vers ' + timeStr, sub: currentTemp.toFixed(1) + '°C — ça monte !' };
  }

  function renderForecast(tempC) {
    const forecast = computeForecast(historyEntries, tempC);
    const card = document.getElementById('forecast-card');
    if (!forecast) { card.classList.remove('visible'); return; }
    card.classList.add('visible');
    document.getElementById('forecast-label').textContent = forecast.text;
    document.getElementById('forecast-sub').textContent = forecast.sub;
  }

  async function fetchHistory() {
    try {
      const res = await fetch('history.json?ts=' + Date.now());
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      historyEntries = data.entries || [];
      renderSparkline(historyEntries);
    } catch (e) {
      // history unavailable — sparkline and forecast stay hidden
    }
  }

  async function fetchStatus() {
    try {
      const res = await fetch('status.json?ts=' + Date.now());
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json(); // peut throw SyntaxError si JSON corrompu
      lastGoodData = data;
      localStorage.setItem('lastStatus', JSON.stringify(data));
      applyData(data);
    } catch (e) {
      // Fallback localStorage
      const cached = localStorage.getItem('lastStatus');
      if (cached) {
        try {
          applyData(JSON.parse(cached));
        } catch (_) {
          showError();
        }
      } else {
        showError();
      }
    }
  }

  function showError() {
    const card = document.getElementById('status-card');
    card.className = 'status-card no';
    document.getElementById('status-icon').textContent = '⚠️';
    document.getElementById('status-label').textContent = 'Erreur de chargement';
    document.getElementById('status-reason').textContent = 'Vérifier la connexion et réessayer';
    document.getElementById('metric-temp').classList.remove('loading');
    document.getElementById('metric-air-temp').classList.remove('loading');
    document.getElementById('metric-pump-power').classList.remove('loading');
  }

  // Initial load + refresh toutes les 5 min
  fetchStatus();
  fetchHistory();
  setInterval(fetchStatus, 5 * 60 * 1000);
  setInterval(fetchHistory, 5 * 60 * 1000);

  // Service worker (PWA offline support)
  if ('serviceWorker' in navigator) {
    try { navigator.serviceWorker.register('sw.js'); } catch (_) {}
  }
</script>
</body>
</html>
